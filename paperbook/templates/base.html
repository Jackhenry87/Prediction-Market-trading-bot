<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Paper Sportsbook{% endblock %}</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 820px; margin: 0 auto;
         padding: 1rem; line-height: 1.5; }
  header { display: flex; justify-content: space-between; align-items: center;
           border-bottom: 1px solid #8884; padding-bottom: .5rem; }
  nav a { margin-left: 1rem; }
  table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  th, td { text-align: left; padding: .4rem .5rem; border-bottom: 1px solid #8883; }
  .btn { display: inline-block; padding: .3rem .6rem; border: 1px solid #8886;
         border-radius: 6px; background: #6a8cff22; cursor: pointer; }
  .muted { color: #8889; font-size: .9rem; }
  .bal { font-weight: 600; }
  input, select { padding: .3rem; margin: .2rem 0; }
  .play-money { background: #ffd60022; border: 1px solid #ffd60066;
                padding: .4rem .6rem; border-radius: 6px; font-size: .85rem; }
</style>
</head>
<body>
<header>
  <strong>🎲 Paper Sportsbook</strong>
  <nav>
    <a href="/">Games</a>
    {% if user %}<a href="/mybets">My Bets</a>
      <span class="bal">{{ user["balance_cents"] | dollars }}</span>
      <a href="/logout">Log out</a>
    {% else %}<a href="/login">Log in</a> <a href="/signup">Sign up</a>{% endif %}
  </nav>
</header>
<p class="play-money">🟡 Play money only. No real wagering, no cash value.</p>
{% block body %}{% endblock %}
</body>
</html>
