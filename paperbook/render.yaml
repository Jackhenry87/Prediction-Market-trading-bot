services:
  - type: web
    name: paper-sportsbook
    runtime: python
    buildCommand: pip install -r paperbook/requirements.txt
    startCommand: uvicorn paperbook.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ODDS_API_KEY
        sync: false
