name: diag-fills

# One-off diagnostic of the portfolio APIs (fills/settlements/orders) to
# chase why reconciliation saw zero fills while the balance moved.
# Read-only. Delete when solved.

on:
  push:
    branches: ['claude/polymarket-trading-bot-w9cp9m']
    paths: ['diag_fills.py']
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Diagnose
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: prod
          DRY_RUN: 'true'
          MAX_ORDER_SIZE: '2'
          MAX_TOTAL_EXPOSURE: '20'
        run: python diag_fills.py
