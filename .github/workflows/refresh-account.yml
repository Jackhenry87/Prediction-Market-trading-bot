name: refresh-account

# Authoritative scoreboard + spreadsheet refresh from Kalshi's REST API.
# Runs hourly at :30 (a free slot — autotrade :00, smartmoney :15, sports :45)
# so kalshi_report.csv / paper_report.csv / trade_history.csv and the Account
# section stay live from your real portfolio without you tapping anything.
# You can also run it on demand from the Actions tab (or your phone).

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-account
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Refresh account from Kalshi REST API
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          KALSHI_DEPOSITS_USD: ${{ vars.KALSHI_DEPOSITS_USD || '50' }}
          RECORD_SINCE: ${{ vars.RECORD_SINCE || '2026-07-02' }}
        run: python refresh_account.py

      - name: Commit refreshed scoreboard + spreadsheets
        if: always()
        run: |
          git config user.name "account-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f account_snapshot.json SCOREBOARD.md \
            kalshi_report.csv paper_report.csv \
            trade_history.csv HISTORY.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "account refresh from Kalshi API [skip ci]"
            for i in 1 2 3 4 5; do
              git fetch -q origin main || true
              git rebase -X theirs origin/main || git rebase --abort || true
              if git push origin HEAD:main; then break; fi
              sleep $((i * 3))
            done
          fi
