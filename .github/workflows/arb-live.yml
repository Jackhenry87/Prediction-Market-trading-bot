name: arb-live

# Within-Kalshi risk-free basket hunter (kalshi_arb + arb_runner), 24/7.
# DISCOVERS every mutually-exclusive ladder exchange-wide (~1000+: sports
# futures, elections, econ ranges, entertainment, weather) each pass and buys
# every leg of any basket trading below its $1 payout. Fast-polls every few
# minutes for ~110 min; hourly cron + queued concurrency = a continuous chain
# (arbs live for seconds, so poll speed IS catch rate).
#
# SAFE BY DEFAULT: DRY_RUN=true, so it only DETECTS and logs. To place real
# risk-free baskets set repo Variable ARB_DRY_RUN=false (and KILL_SWITCH=false).
# Most passes find nothing — that's the tool working, not failing.

on:
  schedule:
    - cron: '*/15 * * * *'    # light single-pass every 15 min (minute-frugal)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: arb-live
  cancel-in-progress: false

jobs:
  arb:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Hunt risk-free baskets
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          # detect-only until you deliberately arm it
          DRY_RUN: ${{ vars.ARB_DRY_RUN || 'true' }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          MAX_ORDER_SIZE: ${{ vars.MAX_ORDER_SIZE || '2' }}
          MAX_TOTAL_EXPOSURE: ${{ vars.MAX_TOTAL_EXPOSURE || '20' }}
          # discovery scans the whole exchange; optionally pin categories/series
          ARB_CATEGORIES: ${{ vars.ARB_CATEGORIES || '' }}
          ARB_SERIES: ${{ vars.ARB_SERIES || '' }}
          ARB_MIN_PROFIT_CENTS: ${{ vars.ARB_MIN_PROFIT_CENTS || '2' }}
          # depth-aware sizing: up to this % of balance, keeping a reserve
          ARB_MAX_BALANCE_PCT: ${{ vars.ARB_MAX_BALANCE_PCT || '100' }}
          ARB_RESERVE_USD: ${{ vars.ARB_RESERVE_USD || '0' }}
        run: python arb_runner.py --once

      - name: Persist executed arb records
        if: always()
        run: |
          git config user.name "arb-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f executed_trades.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "arb records [skip ci]"
            for i in 1 2 3 4 5; do
              git fetch -q origin main || true
              git rebase -X theirs origin/main || git rebase --abort || true
              if git push origin HEAD:main; then break; fi
              sleep $((i * 3))
            done
          fi
