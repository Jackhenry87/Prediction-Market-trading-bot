name: arb-live

# Dedicated arb hunter, its own fast 5-min cadence (separate from live-bots)
# because arbs are FLEETING — they live for seconds, so poll speed IS catch
# rate, and Actions minutes are free on this public repo. Single-pass each run:
# full-exchange MECE-ladder discovery + depth-aware placement.
#
# RUNS ON THE DEMO ACCOUNT ($200 play money). It PLACES real baskets
# (DRY_RUN=false) but against demo-api.kalshi.co, so a live, continuous demo of
# arb working with ZERO real-money risk. Only ever places provably-exhaustive
# numeric-ladder baskets (the exhaustiveness guard). Nothing is committed back —
# demo fills must never touch the real-money executed_trades.csv on this public
# repo. When you're ready to go live on prod, flip the env block back to the
# prod secrets + KALSHI_ENV=prod and re-add a persist step.

on:
  # PAUSED: refocused on sports. Genuine arbs are rare + fleeting and unreachable
  # on a 5-min cron anyway; revive this (uncomment) only alongside a real-time
  # WS execution engine. Still runnable on demand via the Actions tab.
  # schedule:
  #   - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: arb-live
  cancel-in-progress: false

jobs:
  arb:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi demo key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_DEMO_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_demo.pem
      - name: Hunt risk-free baskets (DEMO — $200 play money)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_DEMO_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_demo.pem
          KALSHI_ENV: demo
          # play money — actually PLACE baskets so you can watch arb work live
          DRY_RUN: 'false'
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          # demo has $200; let baskets use all of it, no per-order cap in the way
          MAX_ORDER_SIZE: '10000'
          MAX_TOTAL_EXPOSURE: '200'
          ARB_CATEGORIES: ${{ vars.ARB_CATEGORIES || '' }}
          ARB_SERIES: ${{ vars.ARB_SERIES || '' }}
          ARB_MIN_PROFIT_CENTS: ${{ vars.ARB_MIN_PROFIT_CENTS || '2' }}
          ARB_MAX_BALANCE_PCT: '100'
          ARB_RESERVE_USD: '0'
        run: python arb_runner.py --once
