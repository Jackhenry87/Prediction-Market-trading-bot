name: arb-live

# Dedicated arb hunter, its own fast 5-min cadence (separate from live-bots)
# because arbs are FLEETING — they live for seconds, so poll speed IS catch
# rate, and Actions minutes are free on this public repo. Single-pass each run:
# full-exchange MECE-ladder discovery + depth-aware placement.
#
# SAFE BY DEFAULT: DETECT-ONLY (DRY_RUN=true). To place real risk-free baskets,
# set repo Variable ARB_DRY_RUN=false (and KILL_SWITCH=false). Only ever places
# provably-exhaustive numeric-ladder baskets (the exhaustiveness guard).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: arb-live
  cancel-in-progress: false

jobs:
  arb:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Hunt risk-free baskets
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          DRY_RUN: ${{ vars.ARB_DRY_RUN || 'true' }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          MAX_ORDER_SIZE: ${{ vars.MAX_ORDER_SIZE || '2' }}
          MAX_TOTAL_EXPOSURE: ${{ vars.MAX_TOTAL_EXPOSURE || '20' }}
          ARB_CATEGORIES: ${{ vars.ARB_CATEGORIES || '' }}
          ARB_SERIES: ${{ vars.ARB_SERIES || '' }}
          ARB_MIN_PROFIT_CENTS: ${{ vars.ARB_MIN_PROFIT_CENTS || '2' }}
          ARB_MAX_BALANCE_PCT: ${{ vars.ARB_MAX_BALANCE_PCT || '100' }}
          ARB_RESERVE_USD: ${{ vars.ARB_RESERVE_USD || '0' }}
        run: python arb_runner.py --once

      - name: Persist executed arb records
        if: always()
        run: |
          git config user.name "arb-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f executed_trades.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "arb records [skip ci]"
            for i in 1 2 3 4 5; do
              git fetch -q origin main || true
              git rebase -X theirs origin/main || git rebase --abort || true
              if git push origin HEAD:main; then break; fi
              sleep $((i * 3))
            done
          fi
