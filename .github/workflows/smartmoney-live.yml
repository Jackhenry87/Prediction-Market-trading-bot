name: smartmoney-live

# The always-on smart-money COPY watcher — deliberately separate from the
# hourly auto-trade pipeline. Each job polls Polymarket's sharp wallets
# every SM_POLL_SECONDS for ~110 minutes and copies fresh >=3-sharp
# consensus onto Kalshi IMMEDIATELY, sized 4-8% of bankroll by conviction.
# Hourly cron + queued concurrency = continuous 24/7 chain (a new session
# starts as the previous one ends; never two at once).
#
# Stop it from your phone: repo Variable KILL_SWITCH=true (blocks orders)
# or SM_DRY_RUN=true (watch without placing). Records are recovered into
# executed_trades.csv by the hourly runs' fills reconciliation.

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: smartmoney-live
  cancel-in-progress: false

jobs:
  copy:
    runs-on: ubuntu-latest
    timeout-minutes: 125
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Watch and copy
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          DRY_RUN: ${{ vars.SM_DRY_RUN || vars.DRY_RUN || 'false' }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          MAX_ORDER_SIZE: ${{ vars.MAX_ORDER_SIZE || '2' }}
          MAX_TOTAL_EXPOSURE: ${{ vars.MAX_TOTAL_EXPOSURE || '20' }}
          SM_COPY_MIN_PCT: ${{ vars.SM_COPY_MIN_PCT || '4' }}
          SM_COPY_MAX_PCT: ${{ vars.SM_COPY_MAX_PCT || '8' }}
          SM_POLL_SECONDS: ${{ vars.SM_POLL_SECONDS || '600' }}
          SM_RUN_MINUTES: '110'
        run: python smartmoney_runner.py
