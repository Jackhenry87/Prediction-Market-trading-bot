name: smartmoney-live

# The always-on smart-money COPY watcher — deliberately separate from the
# hourly auto-trade pipeline. Each job polls Polymarket's sharp wallets
# every SM_POLL_SECONDS for ~110 minutes and copies fresh >=3-sharp
# consensus onto Kalshi IMMEDIATELY, sized 4-8% of bankroll by conviction.
# Hourly cron + queued concurrency = continuous 24/7 chain (a new session
# starts as the previous one ends; never two at once).
#
# Stop it from your phone: repo Variable KILL_SWITCH=true (blocks orders)
# or SM_DRY_RUN=true (watch without placing). Records are recovered into
# executed_trades.csv by the hourly runs' fills reconciliation.

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: smartmoney-live
  cancel-in-progress: false

jobs:
  copy:
    runs-on: ubuntu-latest
    timeout-minutes: 125
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Watch and copy
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          DRY_RUN: ${{ vars.SM_DRY_RUN || vars.DRY_RUN || 'false' }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          MAX_ORDER_SIZE: ${{ vars.MAX_ORDER_SIZE || '2' }}
          MAX_TOTAL_EXPOSURE: ${{ vars.MAX_TOTAL_EXPOSURE || '20' }}
          SM_COPY_MIN_PCT: ${{ vars.SM_COPY_MIN_PCT || '4' }}
          SM_COPY_MAX_PCT: ${{ vars.SM_COPY_MAX_PCT || '8' }}
          SM_POLL_SECONDS: ${{ vars.SM_POLL_SECONDS || '600' }}
          SM_RUN_MINUTES: '110'
          # follow-the-exit is a live SELL surface: OFF unless armed
          SM_FOLLOW_EXITS: ${{ vars.SM_FOLLOW_EXITS || 'false' }}
          # pinned specialists always kept in the sharp pool (comma-separated
          # Polymarket wallets). Seeded with holymoses7 (elections sharp,
          # $1->~$87k). Add more via the repo Variable. Consensus + flywheel
          # still apply — a pin is "always considered", not "always copied".
          SM_PINNED_WALLETS: ${{ vars.SM_PINNED_WALLETS || '0xa4b366ad22fc0d06f1e934ff468e8922431a87b8' }}
          # auto-sell each copy at entry +this% so winners recycle instead of
          # locking until resolution (esp. long-dated politics). 0 disables.
          SM_TAKE_PROFIT_PCT: ${{ vars.SM_TAKE_PROFIT_PCT || '75' }}
          # HARD lockup guard: never buy a market resolving more than this
          # many days out, so capital can't freeze in a far-dated bet. 0 off.
          SM_MAX_DAYS_OUT: ${{ vars.SM_MAX_DAYS_OUT || '60' }}
        run: python smartmoney_runner.py

      - name: Persist copy state + copy scoreboard across sessions
        if: always()
        run: |
          git config user.name "smartmoney-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in smartmoney_open_copies.json copy_trades.csv \
                   COPY_SCOREBOARD.md; do
            git add -f "$f" 2>/dev/null || true
          done
          if ! git diff --cached --quiet; then
            git commit -m "copy state + scoreboard [skip ci]"
            # conflict-proof: main moves during the ~110-min session (merges,
            # the hourly run), so a plain rebase hits content conflicts in
            # these generated files and fails the whole job. Keep OUR fresh
            # copy (-X theirs = the rebased commit's version) and never fail.
            for i in 1 2 3 4 5; do
              git fetch -q origin main || true
              git rebase -X theirs origin/main || git rebase --abort || true
              if git push origin HEAD:main; then break; fi
              sleep $((i * 3))
            done
          fi
