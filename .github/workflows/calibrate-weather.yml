name: calibrate-weather

# Manual, read-only analysis: measures real 1-day-ahead high-temp forecast
# error per Kalshi station (Open-Meteo archives) and prints suggested
# per-city sigmas for strategy_weather. No orders, no secrets needed.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Measure forecast error per station
        run: python calibrate_weather.py
