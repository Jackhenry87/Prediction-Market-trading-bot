name: calibrate-weather

# Self-calibration: measures each Kalshi station's recent (current-season)
# 1-day-ahead high-temp forecast error from Open-Meteo archives and writes
# weather_calibration.json, which the model reads for per-station bias and
# sigma and to auto-bench stations whose forecasts have broken this season.
# Runs weekly (and on demand). Read-only vs Kalshi; no secrets needed.

on:
  schedule:
    - cron: '30 9 * * 1'      # Mondays 09:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Measure forecast error per station
        run: python calibrate_weather.py
      - name: Commit refreshed calibration
        if: always()
        run: |
          git config user.name "calibrate-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f weather_calibration.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Refresh weather calibration [skip ci]"
            for i in 1 2 3 4 5; do
              git fetch -q origin main || true
              git rebase -X theirs origin/main || git rebase --abort || true
              if git push origin HEAD:main; then break; fi
              sleep $((i * 3))
            done
          fi
