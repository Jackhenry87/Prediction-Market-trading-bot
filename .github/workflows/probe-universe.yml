name: probe-universe

# Full placeable-universe inventory (Kalshi vs-series + Polymarket sharp
# flow by category) for the copier's generic mapper. Push-triggered;
# commits results back. Read-only, no secrets. Delete after shipping.

on:
  push:
    branches: ['claude/polymarket-trading-bot-w9cp9m']
    paths: ['probe_universe.py']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python probe_universe.py
      - name: Commit probe results back to the branch
        run: |
          git config user.name "auto-trade-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add probe_results/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Universe probe results [skip ci]"
            git pull --rebase && git push
          fi
