name: probe-polymarket

# Schema probe for Polymarket's public read-only APIs (the smart-money
# tracker's data source). Push-triggered on the dev branch because the dev
# sandbox can't reach polymarket.com; results are committed back so the
# session can pull them over git. Read-only, no secrets. Delete after the
# tracker ships.

on:
  push:
    branches: ['claude/polymarket-trading-bot-w9cp9m']
    paths: ['probe_polymarket.py']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python probe_polymarket.py
      - name: Commit probe results back to the branch
        run: |
          git config user.name "auto-trade-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add probe_results/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Polymarket API probe results [skip ci]"
            git pull --rebase && git push
          fi
