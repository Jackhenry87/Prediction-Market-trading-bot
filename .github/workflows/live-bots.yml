name: live-bots

# Consolidated live runner: smart-money copier + sports in ONE job, so the
# ~50s setup tax (checkout + Python + pip) is paid once per cycle. Runs every
# 20 min:
#   - smart-money copier : every run  (live)
#   - sports tracker     : once/hour  (top-of-hour cycle; lines move slowly)
# (arb runs in its own arb-live workflow at a faster 5-min cadence — arbs are
# fleeting, so it needs to poll more often than the copier/sports.)
# Each runner keeps its own gates/budgets/dedup; DRY_RUN is set per-runner.
# Stop from your phone: repo Variable KILL_SWITCH=true (blocks all orders).

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: live-bots
  cancel-in-progress: false

jobs:
  bots:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Run the live bots (one setup, three passes)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          MAX_ORDER_SIZE: ${{ vars.MAX_ORDER_SIZE || '2' }}
          MAX_TOTAL_EXPOSURE: ${{ vars.MAX_TOTAL_EXPOSURE || '20' }}
          # per-runner dry-run
          SM_DRY_RUN: ${{ vars.SM_DRY_RUN || vars.DRY_RUN || 'false' }}
          SPORTS_DRY_RUN: ${{ vars.SPORTS_DRY_RUN || vars.DRY_RUN || 'false' }}
          # --- smart-money copier ---
          SM_COPY_MIN_PCT: ${{ vars.SM_COPY_MIN_PCT || '4' }}
          SM_COPY_MAX_PCT: ${{ vars.SM_COPY_MAX_PCT || '8' }}
          SM_FOLLOW_EXITS: ${{ vars.SM_FOLLOW_EXITS || 'false' }}
          SM_PINNED_WALLETS: ${{ vars.SM_PINNED_WALLETS || '0xa4b366ad22fc0d06f1e934ff468e8922431a87b8' }}
          SM_TAKE_PROFIT_PCT: ${{ vars.SM_TAKE_PROFIT_PCT || '75' }}
          SM_MAX_DAYS_OUT: ${{ vars.SM_MAX_DAYS_OUT || '60' }}
          # --- sports ---
          SPORTS_LEAGUES: ${{ vars.SPORTS_LEAGUES || 'mlb,nba,nfl,nhl,wnba' }}
          SPORTS_MAX_ML_PER_DAY: ${{ vars.SPORTS_MAX_ML_PER_DAY || '2' }}
          SPORTS_MAX_TOTALS_PER_DAY: ${{ vars.SPORTS_MAX_TOTALS_PER_DAY || '2' }}
          SPORTS_MIN_CONFIDENCE: ${{ vars.SPORTS_MIN_CONFIDENCE || '0.60' }}
          SPORTS_MIN_MOVE: ${{ vars.SPORTS_MIN_MOVE || '0.01' }}
          SPORTS_TOTAL_SIGMA: ${{ vars.SPORTS_TOTAL_SIGMA || '3.0' }}
        run: |
          # smart-money copier — every run
          DRY_RUN="$SM_DRY_RUN" python smartmoney_runner.py --once || true
          # sports — only the top-of-hour cycle (~hourly); lines move slowly.
          # base-10 forced so 08/09 don't trip octal parsing.
          min=$((10#$(date -u +%M)))
          if [ "$min" -lt 20 ]; then
            DRY_RUN="$SPORTS_DRY_RUN" python sports_runner.py --once || true
          else
            echo "skipping sports this cycle (runs top-of-hour)"
          fi

      - name: Persist state across runs
        if: always()
        run: |
          git config user.name "live-bots"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in smartmoney_open_copies.json copy_trades.csv COPY_SCOREBOARD.md \
                   sports_line_history.json paper_trades_sports.csv \
                   executed_trades.csv; do
            git add -f "$f" 2>/dev/null || true
          done
          if ! git diff --cached --quiet; then
            git commit -m "live-bots state [skip ci]"
            for i in 1 2 3 4 5; do
              git fetch -q origin main || true
              git rebase -X theirs origin/main || git rebase --abort || true
              if git push origin HEAD:main; then break; fi
              sleep $((i * 3))
            done
          fi
