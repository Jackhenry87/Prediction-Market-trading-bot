name: live-bots

# REFOCUSED ON SPORTS — the one reachable edge (sharp-book info vs a softer
# venue). Runs the sports model on REAL Kalshi every 15 min, then updates the
# CLV scoreboard: closing-line value, the honest proof-of-edge that must go
# positive over ~30+ bets BEFORE any real size is added. The other models
# (weather/nowcast/smartmoney/arb) are paused — their schedules are disabled —
# to concentrate capital and attention here. Units stay small on purpose: CLV
# doesn't depend on stake, so we validate the edge for pennies.
# Stop from your phone: repo Variable KILL_SWITCH=true (blocks all orders).

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: live-bots
  cancel-in-progress: false

jobs:
  sports:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Sports (real money) + CLV proof-of-edge
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          # LIVE real money by default — the only honest fill test. Small units:
          # we're validating CLV, not scaling. Bump only after CLV proves out.
          DRY_RUN: ${{ vars.SPORTS_DRY_RUN || 'false' }}
          MAX_ORDER_SIZE: ${{ vars.MAX_ORDER_SIZE || '2' }}
          MAX_TOTAL_EXPOSURE: ${{ vars.MAX_TOTAL_EXPOSURE || '20' }}
          SPORTS_LEAGUES: ${{ vars.SPORTS_LEAGUES || 'mlb,nba,nfl,nhl,wnba' }}
          SPORTS_MAX_ML_PER_DAY: ${{ vars.SPORTS_MAX_ML_PER_DAY || '2' }}
          SPORTS_MAX_TOTALS_PER_DAY: ${{ vars.SPORTS_MAX_TOTALS_PER_DAY || '2' }}
          SPORTS_MIN_CONFIDENCE: ${{ vars.SPORTS_MIN_CONFIDENCE || '0.60' }}
          # Higher-conviction only: require a BIGGER steam move (real sharp
          # confirmation, not noise). Moneyline 0.03 = 3 win-prob points;
          # totals 0.5 = half a point of line movement toward our side.
          SPORTS_MIN_MOVE: ${{ vars.SPORTS_MIN_MOVE || '0.03' }}
          SPORTS_TOTAL_MIN_MOVE: ${{ vars.SPORTS_TOTAL_MIN_MOVE || '0.5' }}
          SPORTS_TOTAL_SIGMA: ${{ vars.SPORTS_TOTAL_SIGMA || '3.0' }}
        run: |
          python sports_runner.py --once || true
          # CLV: snapshot each open sports bet's price; freeze the closing line
          # on settlement; refresh CLV_SCOREBOARD.md.
          python clv_tracker.py || true
      - name: Persist sports + CLV state
        if: always()
        run: |
          git config user.name "sports-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in sports_line_history.json paper_trades_sports.csv \
                   executed_trades.csv clv_sports.csv CLV_SCOREBOARD.md; do
            git add -f "$f" 2>/dev/null || true
          done
          if ! git diff --cached --quiet; then
            git commit -m "sports + CLV state [skip ci]"
            for i in 1 2 3 4 5; do
              git fetch -q origin main || true
              git rebase -X theirs origin/main || git rebase --abort || true
              if git push origin HEAD:main; then break; fi
              sleep $((i * 3))
            done
          fi
