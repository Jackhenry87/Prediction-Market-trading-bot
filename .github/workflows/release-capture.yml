name: release-capture

# Paper test of the macro resolution-lag edge WITHOUT a VPS: fires around
# US release windows and bursts for a few minutes, PAPER only. Less precise
# than a VPS (GitHub cron can lag a few minutes) but free and enough to see
# whether the lag exists on slow markets. Needs the FRED_API_KEY secret.
#
# 8:30am ET = 12:30 UTC (EDT, summer) or 13:30 UTC (EST, winter) — we cover
# both. Thursdays = jobless claims; Fridays = first-Friday payrolls (the
# runner just finds nothing on non-release days, which is harmless).

on:
  schedule:
    - cron: '32 12 * * 4'   # Thu 12:32 UTC (claims, EDT)
    - cron: '32 13 * * 4'   # Thu 13:32 UTC (claims, EST)
    - cron: '32 12 * * 5'   # Fri 12:32 UTC (payrolls, EDT)
    - cron: '32 13 * * 5'   # Fri 13:32 UTC (payrolls, EST)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-capture
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem
      - name: Burst (paper)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ENABLED_MODELS: macro
          DRY_RUN: 'true'          # PAPER — verify mappings before ever going live
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          MAX_ORDER_SIZE: ${{ vars.MAX_ORDER_SIZE || '2' }}
          MAX_TOTAL_EXPOSURE: ${{ vars.MAX_TOTAL_EXPOSURE || '20' }}
          BURST_WINDOW_SECONDS: '600'   # 10-min poll window inside the job
          BURST_POLL_SECONDS: '15'
        run: python release_runner.py --once
      - name: Commit logs + macro ledger
        if: always()
        run: |
          git config user.name "auto-trade-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f paper_trades_macro.csv SCOREBOARD.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Release-capture paper run [skip ci]"
            git pull --rebase && git push
          fi
