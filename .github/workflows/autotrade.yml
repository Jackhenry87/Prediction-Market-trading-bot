name: auto-trade

# Runs the trading bot on GitHub's servers — no laptop needed.
# Hourly during trading hours: 12:00-23:00 and 00:00-01:00 UTC
# = 7am-8pm US Central. Each run scans, exits winners, and buys new
# edges; between runs nothing executes (GitHub cron can also lag by
# several minutes — that's normal).
# Also triggerable manually from the Actions tab (works from the phone app).
#
# Control knobs WITHOUT code changes (repo Settings -> Secrets and
# variables -> Actions -> Variables): DRY_RUN, KILL_SWITCH,
# MAX_ORDER_SIZE, MAX_TOTAL_EXPOSURE, MAX_ORDER_PCT, MIN_ORDER_PCT,
# TAKE_PROFIT_PCT, KALSHI_ENV.
# Setting KILL_SWITCH=true from your phone stops all trading.

on:
  schedule:
    - cron: '0 12-23 * * *'
    - cron: '0 0-1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Write Kalshi private key from repository secret
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_PRIVATE_KEY_PEM }}
        run: |
          if [ -z "$KALSHI_PEM" ]; then
            echo "::error::Secret KALSHI_PRIVATE_KEY_PEM is not set"; exit 1
          fi
          printf '%s\n' "$KALSHI_PEM" > kalshi_prod.pem

      - name: Run auto-trade
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_prod.pem
          KALSHI_ENV: ${{ vars.KALSHI_ENV || 'prod' }}
          # LIVE by default (owner's choice): places real orders. The ledger
          # now records every signal so the scoreboard measures results even
          # while trading live. Set repo Variable DRY_RUN=true to paper-test.
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
          KILL_SWITCH: ${{ vars.KILL_SWITCH || 'false' }}
          MAX_ORDER_SIZE: ${{ vars.MAX_ORDER_SIZE || '2' }}
          MAX_TOTAL_EXPOSURE: ${{ vars.MAX_TOTAL_EXPOSURE || '20' }}
          MAX_ORDER_PCT: ${{ vars.MAX_ORDER_PCT || '4' }}
          MIN_ORDER_PCT: ${{ vars.MIN_ORDER_PCT || '1' }}
          TAKE_PROFIT_PCT: ${{ vars.TAKE_PROFIT_PCT || '50' }}
          TRADE_MIN_PRICE: ${{ vars.TRADE_MIN_PRICE || '60' }}
          TRADE_MAX_PRICE: ${{ vars.TRADE_MAX_PRICE || '90' }}
          # Hourly is weather-only (owner call): weather = the forecast
          # model, nowcast = the intraday half of the same weather markets
          # (locks in temps already observed). Sports/crypto/commodities
          # OFF. smartmoney is NOT here by design — it has its own
          # always-on watcher (smartmoney-live.yml). Override via repo
          # Variable ENABLED_MODELS if ever needed.
          # sports runs 24/7 in its own always-on runner (sports-live.yml),
          # NOT here — the hourly stays weather-only and just scores/commits.
          ENABLED_MODELS: ${{ vars.ENABLED_MODELS || 'weather,nowcast' }}
          # no single theme (weather/crypto/sports/commodities) may exceed
          # this % of bankroll — stops piles of correlated bets from becoming
          # one oversized wager
          MAX_THEME_PCT: ${{ vars.MAX_THEME_PCT || '40' }}
          # New York cut from weather (real settlements: -$6.31, the model's
          # whole loss — oversized + under-forecast four days running). Add
          # NY back via this Variable if it earns its place later.
          WEATHER_CITIES: ${{ vars.WEATHER_CITIES || 'CHI,MIA,DEN,LAX,AUS' }}
          # total you've deposited — the scoreboard's Net P&L is equity
          # (cash + open positions) minus this. Update it when you add funds.
          KALSHI_DEPOSITS_USD: ${{ vars.KALSHI_DEPOSITS_USD || '50' }}
        run: python auto_trade.py

      - name: Commit updated scoreboards back to the repo
        if: always()
        run: |
          git config user.name "auto-trade-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # one add per file: a single multi-path add fails ENTIRELY when any
          # one path doesn't exist (this silently dropped every trade record
          # for days — paper_trades_crypto.csv never exists while crypto is
          # off, so nothing in the list was ever committed)
          for f in paper_trades.csv paper_trades_crypto.csv \
                   paper_trades_commodities.csv \
                   paper_trades_smartmoney.csv paper_trades_macro.csv \
                   paper_trades_nowcast.csv \
                   smartmoney_wallets_log.csv smartmoney_blacklist.json \
                   smartmoney_category_bars.json \
                   executed_trades.csv account_snapshot.json \
                   weather_city_pnl.json SCOREBOARD.md; do
            git add -f "$f" 2>/dev/null || true
          done
          # NB: copier files (smartmoney_open_copies.json / copy_trades.csv /
          # COPY_SCOREBOARD.md) and sports files (sports_line_history.json /
          # paper_trades_sports.csv) are owned+committed by their own always-on
          # runners — the hourly must not re-commit its stale checkout of them.
          if ! git diff --cached --quiet; then
            git commit -m "Update trade records [skip ci]"
            # conflict-proof: generated files can't clean-merge when main moved
            # or another workflow pushed; keep OUR fresh copy and never fail
            # the job over it (-X theirs keeps the rebased commit's version).
            for i in 1 2 3 4 5; do
              git fetch -q origin main || true
              git rebase -X theirs origin/main || git rebase --abort || true
              if git push origin HEAD:main; then break; fi
              sleep $((i * 3))
            done
          fi
