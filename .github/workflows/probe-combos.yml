name: probe-combos

# Do Kalshi combos exist as tradeable tickers? Push-triggered probe
# (sandbox can't reach the APIs); commits results back. Read-only,
# no secrets. Delete after the answer ships.

on:
  push:
    branches: ['claude/polymarket-trading-bot-w9cp9m']
    paths: ['probe_combos.py']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python probe_combos.py
      - name: Commit probe results back to the branch
        run: |
          git config user.name "auto-trade-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add probe_results/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Combo probe results [skip ci]"
            git pull --rebase && git push
          fi
