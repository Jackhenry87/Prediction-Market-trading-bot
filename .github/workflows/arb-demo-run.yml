name: arb-demo-run

# ACTUALLY PLACE arbs on Kalshi DEMO (play money). Runs the real arb runner
# against your demo account with DRY_RUN=false, depth-sizing up to 100% of the
# demo balance. It only ever places TRUE risk-free baskets (the scanner fails
# closed) — so if none exist it places nothing, which is correct.
#
# Deliberately does NOT commit executed_trades.csv: demo fills must never
# pollute the real-money ledger.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  place:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Write demo Kalshi key
        env:
          KALSHI_PEM: ${{ secrets.KALSHI_DEMO_PRIVATE_KEY_PEM }}
        run: printf '%s\n' "$KALSHI_PEM" > kalshi_demo.pem
      - name: Place all risk-free baskets on demo
        env:
          KALSHI_ENV: demo
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_DEMO_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_PATH: kalshi_demo.pem
          DRY_RUN: 'false'                 # play money — actually place
          KILL_SWITCH: 'false'
          MAX_ORDER_SIZE: '10000'          # demo: let depth/liquidity be the cap
          MAX_TOTAL_EXPOSURE: '200'        # your demo balance
          ARB_MIN_PROFIT_CENTS: ${{ vars.ARB_MIN_PROFIT_CENTS || '2' }}
          ARB_MAX_BALANCE_PCT: '100'
          ARB_RESERVE_USD: '0'
        run: python arb_runner.py --once
